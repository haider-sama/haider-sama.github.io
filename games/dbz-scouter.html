<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link href="/src/output.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mechatronics Engineer passionate about building stuff, martial arts and Dragon Ball."
    />
    <link rel="canonical" href="https://haider-sama.github.io/" />
    <title>Haider Ali - Games - DBZ Scouter</title>
  </head>

  <body class="flex flex-col min-h-screen bg-[#a5a5ff]">
    <div
      class="max-w-3xl mx-auto w-full bg-gray-100 border-x border-b border-gray-400"
    >
      <!-- Header -->
      <header
        class="text-center py-16 text-4xl bg-cover bg-center bg-[url('/assets/img/land.jpg')]"
      >
        <h1 class="text-4xl font-bold text-white pixel-shadow">Haider Ali</h1>
      </header>

      <!-- NavBar -->
      <nav
        class="bg-gray-100 flex flex-row justify-center border-y border-gray-400"
      >
        <div
          class="px-4 py-2 border-x border-gray-400 cursor-pointer hover:bg-gray-200 relative group"
        >
          <a href="/">Home</a>
        </div>
        <div
          class="px-4 py-2 border-r border-gray-400 cursor-pointer hover:bg-gray-200 relative group"
        >
          <a href="/projects/">Projects</a>
        </div>
        <div
          class="px-4 py-2 border-r border-gray-400 cursor-pointer hover:bg-gray-200 relative group"
        >
          <a href="/about/">About</a>
        </div>
        <div
          class="px-4 py-2 border-r border-gray-400 cursor-pointer hover:bg-gray-200 relative group"
        >
          <a href="/contact/">Contact</a>
        </div>
      </nav>

      <main class="flex flex-col px-4 py-8 space-y-4">
        <div class="border border-gray-400 px-4 py-2 bg-white">
          <h1 class="font-bold text-xl">Games / DBZ Scouter</h1>
        </div>

        <div class="p-4 border border-gray-400 bg-white space-y-4 text-center">
          <div
            id="character-image-container"
            class="border border-gray-400 bg-white w-fit mx-auto"
          >
            <canvas id="character-canvas" width="72" height="88"></canvas>
          </div>

          <div id="power-level-display" class="text-xl font-semibold">
            Power Level: <span class="power-level">0</span>
            <audio id="scouter-sound" src="/assets/sounds/scouter.mp3"></audio>
          </div>

          <button
            id="start-button"
            class="px-4 py-2 w-32 bg-[#101010] text-white hover:bg-white hover:text-black cursor-pointer border border-[#101010]"
          >
            Scan
          </button>

          <div>Result: <span id="character-message" class="hidden"></span></div>
        </div>
      </main>
    </div>

    <script type="module" src="locale-script.js"></script>

    <footer class="text-center text-xs py-4">
      <p>
        The original contents of this website are licensed by Haider Ali
        (Haider-sama) under a
        <a
          href="https://creativecommons.org/licenses/by/4.0/"
          class="text-blue-500 underline"
          target="_blank"
        >
          Creative Commons Attribution 4.0 International License </a
        >.
      </p>
    </footer>
  </body>
</html>
